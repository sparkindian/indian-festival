<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Festival Wishes</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="manifest" href="../manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

    <meta name="theme-color" content="#0a0416">
</head>
<body data-theme="janmashtami" data-mode="create" class="no-festival">
<!-- Background Effects -->
<div class="background"></div>
<div class="particles" id="particles"></div>
<div class="confetti" id="confetti"></div>


<!-- Main App Container -->
<div class="app">


    <!-- Top Bar -->
    <div class="top-bar">
        <button class="icon-btn" id="menuBtn" aria-label="Menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <line x1="4" y1="7" x2="20" y2="7"/>
                <line x1="4" y1="12" x2="20" y2="12"/>
                <line x1="4" y1="17" x2="20" y2="17"/>
            </svg>
        </button>
        <button class="icon-btn" id="musicBtn" aria-label="Toggle music">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 18V5l12-2v13"/>
                <circle cx="6" cy="18" r="3"/>
                <circle cx="18" cy="16" r="3"/>
            </svg>
        </button>
    </div>


    <!-- Received tag (VIEW mode only) -->
    <div class="received-tag mode-view">
        <span class="received-emoji">💌</span>
        <span>You've received a wish</span>
    </div>


    <!-- Hero Illustration -->
    <div class="hero" id="hero">
        <div class="hero-glow"></div>
        <div class="hero-emoji" id="heroEmoji">🎁</div>
    </div>


    <!-- Wish Card -->
    <div class="wish-card" id="wishCard">
        <div class="wish-card-inner">
            <div class="wish-lantern wish-lantern-left">🏮</div>
            <div class="wish-lantern wish-lantern-right">🏮</div>
            <div class="wish-lantern wish-lantern-right-2">🏮</div>


            <div class="wish-badge" id="wishBadge">🎁</div>


            <div class="wish-name" id="wishName">Your Name</div>


            <div class="wish-subline">
                <span class="sparkle">✦</span>
                <span class="wish-subline-text">wishes you a very</span>
                <span class="sparkle">✦</span>
            </div>


            <div class="wish-headline" id="wishHeadline">Choose a festival</div>


            <div class="wish-divider">
                <span class="divider-dot">◆</span>
                <span class="divider-line"></span>
                <span class="divider-emblem" id="dividerEmblem">✦</span>
                <span class="divider-line"></span>
                <span class="divider-dot">◆</span>
            </div>
        </div>
    </div>


    <!-- View mode CTA -->
    <div class="view-cta mode-view">
        <button class="create-own-btn" id="createOwnBtn">
            <span class="heart-icon">❤️</span>
            <span>Create Your Own Wish</span>
        </button>
        <p class="view-tagline">Send festive wishes to your loved ones</p>
    </div>


    <!-- ==== CREATE mode controls ==== -->
    <div class="create-controls mode-create">


        <!-- Festival Selector -->
        <div class="festival-block">
            <label class="input-label">
                <svg class="input-label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 15 8.5 22 9.3 17 14.1 18.2 21 12 17.8 5.8 21 7 14.1 2 9.3 9 8.5 12 2"/>
                </svg>
                <span>Choose a Festival <span class="req">*</span></span>
            </label>
            <div class="festival-selector">
                <div class="chips-container" id="chipsContainer">
                    <button class="chip" data-festival="diwali">
                        <span class="chip-icon">🪔</span>
                        <span class="chip-label">Diwali</span>
                    </button>
                    <button class="chip" data-festival="holi">
                        <span class="chip-icon">🎨</span>
                        <span class="chip-label">Holi</span>
                    </button>
                    <button class="chip" data-festival="raksha-bandhan">
                        <span class="chip-icon">🧵</span>
                        <span class="chip-label">Raksha<br>Bandhan</span>
                    </button>
                    <button class="chip" data-festival="dussehra">
                        <span class="chip-icon">🏹</span>
                        <span class="chip-label">Dussehra</span>
                    </button>
                    <button class="chip" data-festival="janmashtami">
                        <span class="chip-icon">🦚</span>
                        <span class="chip-label">Janmashtami</span>
                    </button>
                    <button class="chip" data-festival="new-year">
                        <span class="chip-icon">🎆</span>
                        <span class="chip-label">New Year</span>
                    </button>
                </div>
            </div>
        </div>


        <!-- Input Section -->
        <div class="input-section" id="inputSection">
            <label class="input-label" for="nameInput">
                <svg class="input-label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <span>Enter Your Name <span class="req">*</span></span>
            </label>
            <div class="input-wrap">
                <input type="text" class="name-input" id="nameInput" placeholder="Your name" autocomplete="off">
                <button class="clear-btn" id="clearBtn" aria-label="Clear">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="15" y1="9" x2="9" y2="15"/>
                        <line x1="9" y1="9" x2="15" y2="15"/>
                    </svg>
                </button>
            </div>
        </div>


        <!-- Generate Button -->
        <button class="generate-btn" id="generateBtn">
            <span>Generate Wish</span>
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2l1.5 5.5L19 9l-5.5 1.5L12 16l-1.5-5.5L5 9l5.5-1.5L12 2z"/>
                <path d="M19 15l.75 2.75L22.5 18.5l-2.75.75L19 22l-.75-2.75L15.5 18.5l2.75-.75L19 15z" opacity=".7"/>
            </svg>
        </button>


        <div class="assurance">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                <polyline points="9 12 11 14 15 10"/>
            </svg>
            <span>Your wish link will be ready to share</span>
        </div>


        <!-- Action Buttons -->
        <div class="action-buttons" id="actionButtons">
            <button class="action-btn action-whatsapp" id="whatsappBtn">
                   <span class="action-icon whatsapp-icon">
                       <svg viewBox="0 0 24 24" fill="currentColor">
                           <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                       </svg>
                   </span>
                <span class="action-label">Share on<br>WhatsApp</span>
            </button>
            <button class="action-btn action-copy" id="copyBtn">
                   <span class="action-icon copy-icon">
                       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                           <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                           <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                       </svg>
                   </span>
                <span class="action-label">Copy Link</span>
            </button>
            <button class="action-btn action-download" id="downloadBtn">
                   <span class="action-icon download-icon">
                       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                           <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                           <polyline points="7 10 12 15 17 10"/>
                           <line x1="12" y1="15" x2="12" y2="3"/>
                       </svg>
                   </span>
                <span class="action-label">Download<br>Image</span>
            </button>
        </div>


        <!-- Create New Button -->
        <button class="create-new-btn" id="createNewBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            <span>Create New Wish</span>
        </button>
    </div>
</div>


<!-- Toast Notification -->
<div class="toast" id="toast">
    <span id="toastMessage">Link copied!</span>
</div>


<script>
    // Pre-select festival + populate wish card based on URL path so the
    // correct state is visible on first paint (before app.js runs).
    (function () {
        var config = {
            'diwali':         { name: 'Happy Diwali',         icon: '🪔', emblem: '🪔' },
            'holi':           { name: 'Happy Holi',           icon: '🎨', emblem: '🎨' },
            'raksha-bandhan': { name: 'Happy Raksha Bandhan', icon: '🧵', emblem: '🧵' },
            'dussehra':       { name: 'Happy Dussehra',       icon: '🏹', emblem: '🏹' },
            'janmashtami':    { name: 'Happy Janmashtami',    icon: '🦚', emblem: '🪈' },
            'new-year':       { name: 'Happy New Year',       icon: '🎆', emblem: '🎇' }
        };
        var match = window.location.pathname.match(/^\/([a-z-]+)\/?$/);
        var festival = match && config[match[1]] ? match[1] : null;
        if (!festival) return;


        var cfg = config[festival];
        var name = (new URLSearchParams(window.location.search).get('name') || '').trim();


        document.body.dataset.theme = festival;
        document.body.dataset.mode = name ? 'view' : 'create';
        document.body.dataset.pathFestival = festival;
        document.body.classList.remove('no-festival');


        var chip = document.querySelector('.chip[data-festival="' + festival + '"]');
        if (chip) chip.classList.add('active');


        var setText = function (id, text) {
            var el = document.getElementById(id);
            if (el) el.textContent = text;
        };
        setText('heroEmoji', cfg.icon);
        setText('wishBadge', cfg.icon);
        setText('dividerEmblem', cfg.emblem);
        setText('wishHeadline', cfg.name + '!');
        if (name) setText('wishName', name);
    })();
</script>
<script src="../js/app.js"></script>
</body>
</html>
